<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间记录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f5f5f5;padding-bottom:80px}
.header{background:#4169E1;color:white;padding:16px 20px;text-align:center;position:relative}
.updateBtn{position:absolute;left:16px;top:16px;background:rgba(255,255,255,.2);border:none;color:white;padding:4px 8px;border-radius:4px}
.settingBtn{position:absolute;right:16px;top:16px;background:none;border:none;color:white}
.timer{font-size:36px;padding:20px;text-align:center;background:white;margin:10px;border-radius:8px}
.tagBar{display:flex;flex-wrap:wrap;gap:8px;padding:10px}
.tag{background:white;padding:10px 14px;border-radius:8px;flex:1;min-width:100px;text-align:center;box-shadow:0 1px 3px #0001}
.tag.active{background:#4169E1;color:white}
.subTags{display:block;padding:10px}
.subBtn{background:white;border:1px solid #ddd;padding:8px;margin:4px;border-radius:6px}
.subBtn.active{background:#4169E1;color:white}
.summary{background:white;margin:10px;padding:14px;border-radius:8px}
.stats{padding:10px}
.card{background:white;padding:14px;margin-bottom:10px;border-radius:8px}
.row{display:flex;justify-content:space-between;padding:6px 0}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex}
.tab{flex:1;text-align:center;padding:12px}
.tab.active{color:#4169E1;font-weight:bold}
.page{display:none}
.page.active{display:block}
.modal{position:fixed;inset:0;background:#0006;display:none;align-items:center;justify-content:center}
.modalBody{background:white;padding:20px;border-radius:8px;width:90%;max-width:400px}
.modalTitle{font-size:18px;margin-bottom:16px;font-weight:bold}
.modalBtnGroup{display:flex;gap:8px;margin-top:16px}
.modalBtn{padding:8px 16px;border:none;border-radius:6px}
.primaryBtn{background:#4169E1;color:white}
.cancelBtn{background:#eee}
.inputItem{margin-bottom:12px}
.inputItem label{display:block;margin-bottom:4px}
.inputItem input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}
.subTagManage{margin-top:10px}
.subTagItem{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.subTagDelBtn{color:#ff4d4f;border:none;background:none;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <button class="updateBtn" onclick="forceUpdate()">🔄 强制更新</button>
  时间记录
  <button class="settingBtn" onclick="showModal('settingModal')">⚙️ 设置</button>
</div>

<div class="page active" id="pageTimer">
  <div class="timer" id="clock">00:00:00</div>
  <div class="tagBar" id="tagContainer"></div>
  <div class="subTags" id="subTagContainer">
    <div style="margin-bottom:8px;font-size:14px;color:#666">二级标签：</div>
    <div id="subBtns"></div>
  </div>
  <div class="summary">
    <div style="font-size:16px;margin-bottom:8px">今日实时时长</div>
    <div id="todaySum"></div>
  </div>
</div>

<div class="page" id="pageStats">
  <div class="stats">
    <div class="card">
      <div style="font-size:16px;margin-bottom:8px">历史记录</div>
      <div id="historyList"></div>
    </div>
    <div style="display:flex;gap:8px;padding:10px">
      <button class="modalBtn primaryBtn" onclick="exportCSV()">导出记录</button>
      <button class="modalBtn primaryBtn" onclick="backup()">备份数据</button>
      <button class="modalBtn primaryBtn" onclick="document.getElementById('restoreInput').click()">恢复数据</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="doRestore(this)">
    </div>
  </div>
</div>

<div class="tabbar">
  <div class="tab active" onclick="goPage('pageTimer')">计时</div>
  <div class="tab" onclick="goPage('pageStats')">统计</div>
</div>

<div class="modal" id="settingModal">
  <div class="modalBody">
    <div class="modalTitle">标签管理</div>
    <button class="modalBtn primaryBtn" onclick="showModal('tagManageModal')">管理一级标签</button>
    <button class="modalBtn primaryBtn" style="margin-top:8px" onclick="showModal('subTagManageModal')">管理二级标签</button>
    <div class="modalBtnGroup" style="justify-content:flex-end">
      <button class="modalBtn cancelBtn" onclick="hideModal('settingModal')">关闭</button>
    </div>
  </div>
</div>

<div class="modal" id="tagManageModal">
  <div class="modalBody">
    <div class="modalTitle">管理一级标签</div>
    <div class="inputItem">
      <label>新增一级标签</label>
      <input type="text" id="newTagName" placeholder="输入标签名称">
      <button class="modalBtn primaryBtn" style="margin-top:4px" onclick="addMainTag()">添加</button>
    </div>
    <div style="margin-top:16px">
      <div style="font-size:14px;margin-bottom:8px">现有一级标签：</div>
      <div id="mainTagList"></div>
    </div>
    <div class="modalBtnGroup" style="justify-content:flex-end">
      <button class="modalBtn cancelBtn" onclick="hideModal('tagManageModal')">关闭</button>
    </div>
  </div>
</div>

<div class="modal" id="subTagManageModal">
  <div class="modalBody">
    <div class="modalTitle">管理二级标签</div>
    <div class="inputItem">
      <label>选择一级标签</label>
      <select id="mainTagSelect" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px">
      </select>
    </div>
    <div class="inputItem">
      <label>新增二级标签</label>
      <input type="text" id="newSubTagName" placeholder="输入二级标签名称">
      <button class="modalBtn primaryBtn" style="margin-top:4px" onclick="addSubTag()">添加</button>
    </div>
    <div style="margin-top:16px">
      <div style="font-size:14px;margin-bottom:8px" id="subTagTitle">当前一级标签的二级标签：</div>
      <div id="subTagList"></div>
    </div>
    <div class="modalBtnGroup" style="justify-content:flex-end">
      <button class="modalBtn cancelBtn" onclick="hideModal('subTagManageModal')">关闭</button>
    </div>
  </div>
</div>

<script>
// ==========================
// 1. 初始化数据（兼容所有旧数据格式，解决undefined）
// ==========================
// 一级标签
let mainTags = JSON.parse(localStorage.getItem('mainTags')) || [
  { id: 'tag_1', name: '处理工作' },
  { id: 'tag_2', name: '学习研究' },
  { id: 'tag_3', name: '运动健身' },
  { id: 'tag_4', name: '休息睡觉' },
  { id: 'tag_5', name: '主动娱乐' },
  { id: 'tag_6', name: '碎片泄露' }
];

// 二级标签
let subTags = JSON.parse(localStorage.getItem('subTags')) || {
  'tag_1': ['开会', '写文档', '对接需求', '处理邮件', '编程开发'],
  'tag_2': ['学英语', '看书', '写代码', '查资料', '网课学习'],
  'tag_3': ['跑步', '健身', '瑜伽', '打球', '游泳'],
  'tag_4': ['午睡', '夜间睡眠', '发呆', '散步', '冥想'],
  'tag_5': ['看电影', '玩游戏', '听音乐', '追剧', '手工'],
  'tag_6': ['刷短视频', '无目的浏览', '闲聊', '等待', '其他']
};

// 计时记录（兼容旧数据格式，解决undefined）
let records = JSON.parse(localStorage.getItem('timeRecordsV2')) || 
              JSON.parse(localStorage.getItem('timeRecords')) || [];

// 兼容旧数据结构，补全缺失字段
records = records.map(rec => {
  // 补全基础字段
  rec.id = rec.id || 'rec_' + Date.now();
  rec.mainTagId = rec.mainTagId || rec.tagId || '';
  rec.mainTagName = rec.mainTagName || rec.tagName || '未知标签';
  rec.subTagName = rec.subTagName || rec.sub || '未选择';
  rec.startTime = rec.startTime || rec.start || new Date().toISOString();
  rec.endTime = rec.endTime || rec.end || new Date().toISOString();
  rec.duration = rec.duration || rec.dur || 0;
  rec.date = rec.date || new Date().toISOString().split('T')[0];
  return rec;
});

// 计时状态
let currentTagId = localStorage.getItem('currentTagId') || localStorage.getItem('currentTag') || '';
let currentSubTag = localStorage.getItem('currentSubTag') || localStorage.getItem('currentSub') || '';
let startTimeMs = Number(localStorage.getItem('startTimeMs')) || Number(localStorage.getItem('startMs')) || 0;
let timerInterval = null;

// ==========================
// 2. 页面初始化
// ==========================
window.onload = () => {
  renderMainTags();
  renderMainTagSelect();
  renderMainTagList();
  initSubTagManage();
  
  if (currentTagId && startTimeMs > 0) {
    renderSubTags(currentTagId);
    startTimer();
  }
  
  updateTodaySummary();
  setInterval(updateTodaySummary, 1000);
  updateHistoryStats();
};

// ==========================
// 3. 强制更新
// ==========================
function forceUpdate() {
  if (confirm('确定强制更新？所有数据会保留')) {
    saveCurrentState();
    window.location.reload(true);
  }
}

// ==========================
// 4. 计时核心逻辑
// ==========================
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsedSeconds = Math.floor((Date.now() - startTimeMs) / 1000);
    const hours = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
    const minutes = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
    const seconds = String(elapsedSeconds % 60).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
  }, 1000);
}

function stopTimer() {
  if (!timerInterval || !currentTagId || startTimeMs === 0) return;
  
  clearInterval(timerInterval);
  timerInterval = null;
  
  const endTimeMs = Date.now();
  const duration = Math.floor((endTimeMs - startTimeMs) / 1000);
  const today = new Date().toISOString().split('T')[0];
  
  const mainTag = mainTags.find(t => t.id === currentTagId) || { name: '未知标签' };
  const mainTagName = mainTag.name;
  
  records.push({
    id: 'rec_' + Date.now(),
    mainTagId: currentTagId,
    mainTagName: mainTagName,
    subTagName: currentSubTag || '未选择',
    startTime: new Date(startTimeMs).toISOString(),
    endTime: new Date(endTimeMs).toISOString(),
    duration: duration,
    date: today
  });
  
  localStorage.setItem('timeRecordsV2', JSON.stringify(records));
  
  currentTagId = '';
  currentSubTag = '';
  startTimeMs = 0;
  saveCurrentState();
  
  document.getElementById('clock').textContent = '00:00:00';
  renderMainTags();
  renderSubTags('');
  
  updateTodaySummary();
  updateHistoryStats();
}

function saveCurrentState() {
  localStorage.setItem('currentTagId', currentTagId);
  localStorage.setItem('currentSubTag', currentSubTag);
  localStorage.setItem('startTimeMs', startTimeMs);
}

// ==========================
// 5. 一级标签管理
// ==========================
function renderMainTags() {
  const container = document.getElementById('tagContainer');
  container.innerHTML = '';
  
  mainTags.forEach(tag => {
    const tagDiv = document.createElement('div');
    tagDiv.className = 'tag' + (currentTagId === tag.id ? ' active' : '');
    tagDiv.textContent = tag.name || '未知标签';
    
    tagDiv.onclick = () => {
      stopTimer();
      currentTagId = tag.id;
      currentSubTag = '';
      startTimeMs = Date.now();
      saveCurrentState();
      renderMainTags();
      renderSubTags(tag.id);
      startTimer();
    };
    
    container.appendChild(tagDiv);
  });
}

function renderMainTagSelect() {
  const select = document.getElementById('mainTagSelect');
  select.innerHTML = '';
  
  mainTags.forEach(tag => {
    const option = document.createElement('option');
    option.value = tag.id || '';
    option.textContent = tag.name || '未知标签';
    select.appendChild(option);
  });
  
  select.onchange = initSubTagManage;
}

function renderMainTagList() {
  const list = document.getElementById('mainTagList');
  list.innerHTML = '';
  
  mainTags.forEach((tag, index) => {
    const item = document.createElement('div');
    item.className = 'subTagItem';
    item.innerHTML = `
      <span>${tag.name || '未知标签'}</span>
      <button class="subTagDelBtn" onclick="deleteMainTag(${index})">删除</button>
    `;
    list.appendChild(item);
  });
}

function addMainTag() {
  const input = document.getElementById('newTagName');
  const name = input.value.trim();
  
  if (!name) {
    alert('请输入标签名称');
    return;
  }
  
  const newTag = {
    id: 'tag_' + Date.now(),
    name: name
  };
  
  mainTags.push(newTag);
  localStorage.setItem('mainTags', JSON.stringify(mainTags));
  
  if (!subTags[newTag.id]) {
    subTags[newTag.id] = [];
    localStorage.setItem('subTags', JSON.stringify(subTags));
  }
  
  renderMainTags();
  renderMainTagSelect();
  renderMainTagList();
  input.value = '';
}

function deleteMainTag(index) {
  if (!confirm('确定删除该一级标签？相关二级标签也会被删除')) {
    return;
  }
  
  const tagId = mainTags[index].id;
  
  mainTags.splice(index, 1);
  localStorage.setItem('mainTags', JSON.stringify(mainTags));
  
  delete subTags[tagId];
  localStorage.setItem('subTags', JSON.stringify(subTags));
  
  renderMainTags();
  renderMainTagSelect();
  renderMainTagList();
  initSubTagManage();
}

// ==========================
// 6. 二级标签管理
// ==========================
function initSubTagManage() {
  const select = document.getElementById('mainTagSelect');
  const mainTagId = select.value;
  
  const mainTag = mainTags.find(t => t.id === mainTagId) || { name: '未知标签' };
  document.getElementById('subTagTitle').textContent = 
    `【${mainTag.name}】的二级标签：`;
  
  renderSubTagList(mainTagId);
}

function renderSubTags(mainTagId) {
  const container = document.getElementById('subBtns');
  container.innerHTML = '';
  
  const subs = subTags[mainTagId] || [];
  
  if (subs.length === 0) {
    container.innerHTML = '<span style="color:#999">暂无二级标签（可在设置中添加）</span>';
    return;
  }
  
  subs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'subBtn' + (currentSubTag === sub ? ' active' : '');
    btn.textContent = sub || '未知';
    
    btn.onclick = () => {
      currentSubTag = sub;
      saveCurrentState();
      renderSubTags(mainTagId);
    };
    
    container.appendChild(btn);
  });
}

function renderSubTagList(mainTagId) {
  const list = document.getElementById('subTagList');
  list.innerHTML = '';
  
  const subs = subTags[mainTagId] || [];
  
  subs.forEach((sub, index) => {
    const item = document.createElement('div');
    item.className = 'subTagItem';
    item.innerHTML = `
      <span>${sub || '未知'}</span>
      <button class="subTagDelBtn" onclick="deleteSubTag('${mainTagId}', ${index})">删除</button>
    `;
    list.appendChild(item);
  });
  
  if (subs.length === 0) {
    list.innerHTML = '<span style="color:#999">暂无二级标签</span>';
  }
}

function addSubTag() {
  const select = document.getElementById('mainTagSelect');
  const mainTagId = select.value;
  const input = document.getElementById('newSubTagName');
  const name = input.value.trim();
  
  if (!name) {
    alert('请输入二级标签名称');
    return;
  }
  
  if (!subTags[mainTagId]) {
    subTags[mainTagId] = [];
  }
  
  if (subTags[mainTagId].includes(name)) {
    alert('该二级标签已存在');
    return;
  }
  
  subTags[mainTagId].push(name);
  localStorage.setItem('subTags', JSON.stringify(subTags));
  
  initSubTagManage();
  
  if (currentTagId === mainTagId) {
    renderSubTags(mainTagId);
  }
  
  input.value = '';
}

function deleteSubTag(mainTagId, index) {
  if (!confirm('确定删除该二级标签？')) {
    return;
  }
  
  subTags[mainTagId].splice(index, 1);
  localStorage.setItem('subTags', JSON.stringify(subTags));
  
  if (currentSubTag === subTags[mainTagId][index]) {
    currentSubTag = '';
    saveCurrentState();
  }
  
  initSubTagManage();
  
  if (currentTagId === mainTagId) {
    renderSubTags(mainTagId);
  }
}

// ==========================
// 7. 统计功能（彻底解决undefined）
// ==========================
function updateTodaySummary() {
  const today = new Date().toISOString().split('T')[0];
  const summary = {};
  
  records.forEach(rec => {
    if (rec.date === today) {
      const key = rec.mainTagName || '未知标签';
      summary[key] = (summary[key] || 0) + (rec.duration || 0);
    }
  });
  
  if (currentTagId && startTimeMs > 0) {
    const mainTag = mainTags.find(t => t.id === currentTagId) || { name: '未知标签' };
    const key = mainTag.name;
    const currentDuration = Math.floor((Date.now() - startTimeMs) / 1000);
    summary[key] = (summary[key] || 0) + currentDuration;
  }
  
  let html = '';
  for (const [tagName, totalSeconds] of Object.entries(summary)) {
    html += `<div class="row">
      <span>${tagName}</span>
      <span>${formatDuration(totalSeconds)}</span>
    </div>`;
  }
  
  if (!html) {
    html = '<div class="row"><span>今日暂无记录</span></div>';
  }
  
  document.getElementById('todaySum').innerHTML = html;
}

function updateHistoryStats() {
  const groups = {};
  
  records.forEach(rec => {
    const date = rec.date || '未知日期';
    if (!groups[date]) {
      groups[date] = {};
    }
    const key = rec.mainTagName || '未知标签';
    groups[date][key] = (groups[date][key] || 0) + (rec.duration || 0);
  });
  
  const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
  
  let html = '';
  sortedDates.forEach(date => {
    html += `<div style="font-weight:bold;margin-top:8px">${date}</div>`;
    const dayData = groups[date];
    for (const [tagName, totalSeconds] of Object.entries(dayData)) {
      html += `<div class="row">
        <span>${tagName}</span>
        <span>${formatDuration(totalSeconds)}</span>
      </div>`;
    }
  });
  
  if (!html) {
    html = '<div class="row"><span>暂无历史记录</span></div>';
  }
  
  document.getElementById('historyList').innerHTML = html;
}

function formatDuration(seconds) {
  const totalSeconds = Math.round(seconds || 0);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const secs = totalSeconds % 60;
  
  if (hours > 0) {
    return `${hours}小时${minutes}分${secs}秒`;
  } else if (minutes > 0) {
    return `${minutes}分${secs}秒`;
  } else {
    return `${secs}秒`;
  }
}

// ==========================
// 8. 页面切换
// ==========================
function goPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  event.target.classList.add('active');
  
  if (pageId === 'pageStats') {
    updateHistoryStats();
  }
}

// ==========================
// 9. 弹窗管理
// ==========================
function showModal(modalId) {
  document.getElementById(modalId).style.display = 'flex';
}

function hideModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

// ==========================
// 10. 数据备份/导出/恢复
// ==========================
function backup() {
  const backupData = {
    mainTags: mainTags,
    subTags: subTags,
    records: records,
    backupTime: new Date().toLocaleString()
  };
  
  const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `时间记录备份_${new Date().getTime()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  
  alert('备份成功！');
}

function exportCSV() {
  const header = '日期,一级标签,二级标签,开始时间,结束时间,时长(秒),时长(格式化)\n';
  let content = header;
  
  records.forEach(rec => {
    const durationFormatted = formatDuration(rec.duration);
    content += `${rec.date || '未知日期'},${rec.mainTagName || '未知标签'},${rec.subTagName || '未选择'},${rec.startTime || ''},${rec.endTime || ''},${rec.duration || 0},${durationFormatted}\n`;
  });
  
  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  const blob = new Blob([bom, content], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `时间记录_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function doRestore(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      
      if (data.mainTags) mainTags = data.mainTags;
      if (data.subTags) subTags = data.subTags;
      if (data.records) records = data.records;
      
      localStorage.setItem('mainTags', JSON.stringify(mainTags));
      localStorage.setItem('subTags', JSON.stringify(subTags));
      localStorage.setItem('timeRecordsV2', JSON.stringify(records));
      
      renderMainTags();
      renderMainTagSelect();
      renderMainTagList();
      initSubTagManage();
      updateTodaySummary();
      updateHistoryStats();
      
      alert('数据恢复成功！');
    } catch (err) {
      alert('恢复失败：文件格式错误或损坏');
    }
    
    input.value = '';
  };
  
  reader.readAsText(file);
}

// ==========================
// 11. 页面关闭保存
// ==========================
window.onbeforeunload = function() {
  saveCurrentState();
};
</script>
</body>
</html>
