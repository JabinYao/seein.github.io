    <script>
        // 全局错误捕获
        window.onerror = function(msg, url, line) {
            console.error("Global Error:", msg, "Line:", line);
            return true;
        };

        let startTime = null;
        let currentStatus = '';
        let currentSubStatus = '';
        let pendingPrimaryStatus = '';
        let primarySelectedAt = 0;
        let timeRecords = parseStoredJson('timeRecords', []);
        let timerInterval = null;
        let realTimeInterval = null;
        let serviceWorkerRegistration = null;
        let updateReadyWorker = null;
        let currentRange = 'day';
        let currentChartType = 'bar';
        let expandedSummaryGroups = new Set();
        let lastCheckpointAt = 0;
        
        const DEFAULT_TAG_GROUPS = [
            { name: '工作', subTags: ['深度工作', '会议', '沟通', '杂务'] },
            { name: '休息', subTags: ['午休', '放松', '散步'] },
            { name: '运动', subTags: ['力量', '有氧', '拉伸'] },
            { name: '社交', subTags: ['家人', '朋友', '线上交流'] },
            { name: '学习', subTags: ['阅读', '课程', '练习'] }
        ];
        const APP_VERSION = '2026.04.06';
        const VERSION_FILE_URL = new URL('version.json', window.location.href).toString();
        const UPDATE_CHECK_INTERVAL = 5 * 60 * 1000;
        const UPDATE_DISMISS_KEY = 'timeTrackerDismissedVersion';
        const UPDATE_ATTEMPT_KEY = 'timeTrackerUpdateAttempt';
        const SUBCATEGORY_GRACE_MS = 5000;
        
        let tagGroups = loadTagGroups();
        
        let sessionDateStr = '';
        
        const BACKGROUND_START_KEY = 'bgStartTime';
        const BACKGROUND_STATUS_KEY = 'bgStatus';
        const BACKGROUND_DATE_KEY = 'bgSessionDate';
        const CHART_COLORS = ['#4F46E5', '#0EA5E9', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#14B8A6', '#F97316'];

        function updateVersionLabel() {
            const label = document.getElementById('versionLabel');
            if (label) {
                label.textContent = `版本 ${APP_VERSION}`;
            }
        }

        function setCheckUpdateButtonState(label = '检查更新', disabled = false) {
            const button = document.getElementById('checkUpdateBtn');
            if (!button) return;
            button.textContent = label;
            button.disabled = disabled;
        }

        function compareVersions(a, b) {
            const normalize = value => String(value || '')
                .split(/[^0-9A-Za-z]+/)
                .filter(Boolean)
                .map(part => /^\d+$/.test(part) ? Number(part) : part);
            const left = normalize(a);
            const right = normalize(b);
            const maxLength = Math.max(left.length, right.length);

            for (let i = 0; i < maxLength; i += 1) {
                const l = left[i] ?? 0;
                const r = right[i] ?? 0;
                if (typeof l === 'number' && typeof r === 'number') {
                    if (l > r) return 1;
                    if (l < r) return -1;
                    continue;
                }
                const result = String(l).localeCompare(String(r), undefined, { numeric: true, sensitivity: 'base' });
                if (result !== 0) return result;
            }
            return 0;
        }

        function showUpdateBanner({ title, description, actionText = '立即更新', worker = null, remoteVersion = '' }) {
            const banner = document.getElementById('updateBanner');
            const titleEl = document.getElementById('updateTitle');
            const descEl = document.getElementById('updateDesc');
            const actionBtn = document.getElementById('updateActionBtn');
            if (!banner || !titleEl || !descEl || !actionBtn) return;

            if (remoteVersion) {
                const dismissedVersion = localStorage.getItem(UPDATE_DISMISS_KEY);
                const attemptedVersion = sessionStorage.getItem(UPDATE_ATTEMPT_KEY);
                if (dismissedVersion === remoteVersion || attemptedVersion === remoteVersion) {
                    return;
                }
            }

            updateReadyWorker = worker;
            banner.dataset.remoteVersion = remoteVersion;
            titleEl.textContent = title;
            descEl.textContent = description;
            actionBtn.textContent = actionText;
            banner.classList.add('active');
        }

        function hideUpdateBanner(clearDismissedVersion = false) {
            const banner = document.getElementById('updateBanner');
            if (!banner) return;
            banner.classList.remove('active');
            if (clearDismissedVersion) {
                localStorage.removeItem(UPDATE_DISMISS_KEY);
            }
            banner.dataset.remoteVersion = '';
        }

        window.dismissUpdateBanner = function() {
            const banner = document.getElementById('updateBanner');
            const remoteVersion = banner ? banner.dataset.remoteVersion : '';
            if (remoteVersion) {
                localStorage.setItem(UPDATE_DISMISS_KEY, remoteVersion);
            }
            hideUpdateBanner(false);
        };

        async function fetchRemoteVersionInfo() {
            const response = await fetch(`${VERSION_FILE_URL}?t=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`Version request failed: ${response.status}`);
            }
            return response.json();
        }

        async function checkForUpdates({ silent = true } = {}) {
            try {
                const versionInfo = await fetchRemoteVersionInfo();
                const remoteVersion = versionInfo.version || '';
                const releaseNotes = versionInfo.notes || '检测到新版本，建议刷新以获取最新优化。';
                if (remoteVersion && compareVersions(remoteVersion, APP_VERSION) > 0) {
                    showUpdateBanner({
                        title: `发现新版本 ${remoteVersion}`,
                        description: releaseNotes,
                        actionText: '刷新升级',
                        remoteVersion
                    });
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Check update failed:', error);
                if (!silent) {
                    throw error;
                }
                return false;
            }
        }

        function startUpdatePolling() {
            checkForUpdates({ silent: true });
            setInterval(() => {
                checkForUpdates({ silent: true });
            }, UPDATE_CHECK_INTERVAL);
        }

        window.manualCheckForUpdates = async function() {
            setCheckUpdateButtonState('检查中...', true);
            try {
                if (serviceWorkerRegistration && typeof serviceWorkerRegistration.update === 'function') {
                    try {
                        await serviceWorkerRegistration.update();
                        if (serviceWorkerRegistration.waiting) {
                            handleServiceWorkerUpdate(serviceWorkerRegistration.waiting);
                            setCheckUpdateButtonState('发现更新', false);
                            return;
                        }
                    } catch (swError) {
                        console.error('Service worker update check failed:', swError);
                    }
                }

                const hasRemoteUpdate = await checkForUpdates({ silent: false });
                if (hasRemoteUpdate) {
                    setCheckUpdateButtonState('发现更新', false);
                    return;
                }

                alert(`当前已是最新版本 ${APP_VERSION}`);
            } catch (error) {
                console.error('Manual update check failed:', error);
                alert('检查更新失败，请稍后重试。');
            } finally {
                setCheckUpdateButtonState('检查更新', false);
            }
        };

        function handleServiceWorkerUpdate(worker) {
            showUpdateBanner({
                title: '发现可应用更新',
                description: '新版本资源已下载完成，点击立即更新即可切换。',
                actionText: '立即更新',
                worker
            });
        }

        async function clearRuntimeCaches() {
            if (!('caches' in window)) return;
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map(cacheKey => caches.delete(cacheKey)));
        }

        async function hardReloadLatestVersion() {
            try {
                checkpointRunningRecord(new Date());
                await clearRuntimeCaches();
            } catch (error) {
                console.error('Clear caches failed:', error);
            }

            try {
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(registration => registration.unregister()));
                }
            } catch (error) {
                console.error('Unregister service worker failed:', error);
            }

            const reloadUrl = new URL(window.location.href);
            reloadUrl.searchParams.set('update', Date.now().toString());
            window.location.replace(reloadUrl.toString());
        }

        window.applyAppUpdate = async function() {
            const banner = document.getElementById('updateBanner');
            const remoteVersion = banner ? banner.dataset.remoteVersion : '';
            if (remoteVersion) {
                sessionStorage.setItem(UPDATE_ATTEMPT_KEY, remoteVersion);
            }

            if (updateReadyWorker) {
                updateReadyWorker.postMessage({ type: 'SKIP_WAITING' });
                return;
            }

            setCheckUpdateButtonState('升级中...', true);
            if (serviceWorkerRegistration && typeof serviceWorkerRegistration.update === 'function') {
                try {
                    await serviceWorkerRegistration.update();
                    if (serviceWorkerRegistration.waiting) {
                        serviceWorkerRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
                        return;
                    }
                } catch (error) {
                    console.error('Apply update via service worker failed:', error);
                }
            }

            await hardReloadLatestVersion();
        };

        function parseStoredJson(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return structuredClone(fallback);
                const parsed = JSON.parse(raw);
                return parsed ?? structuredClone(fallback);
            } catch (error) {
                console.error(`Failed to parse ${key}:`, error);
                return structuredClone(fallback);
            }
        }

        function cloneDefaultTagGroups() {
            return DEFAULT_TAG_GROUPS.map(group => ({
                name: group.name,
                subTags: [...group.subTags]
            }));
        }

        function normalizeTagGroups(rawGroups) {
            if (!Array.isArray(rawGroups) || rawGroups.length === 0) {
                return cloneDefaultTagGroups();
            }

            const normalized = rawGroups
                .map(group => {
                    if (typeof group === 'string') {
                        return { name: group, subTags: [] };
                    }
                    if (!group || typeof group.name !== 'string') {
                        return null;
                    }
                    return {
                        name: group.name.trim(),
                        subTags: Array.isArray(group.subTags)
                            ? group.subTags.map(item => String(item).trim()).filter(Boolean)
                            : []
                    };
                })
                .filter(group => group && group.name);

            return normalized.length > 0 ? normalized : cloneDefaultTagGroups();
        }

        function loadTagGroups() {
            const storedGroups = parseStoredJson('tagGroups', null);
            if (storedGroups) {
                return normalizeTagGroups(storedGroups);
            }
            const legacyTags = parseStoredJson('statusTags', null);
            if (Array.isArray(legacyTags) && legacyTags.length > 0) {
                return normalizeTagGroups(legacyTags.map(name => ({ name, subTags: [] })));
            }
            return cloneDefaultTagGroups();
        }

        function getPrimaryName(record) {
            return record.category || record.status || '';
        }

        function getSecondaryName(record) {
            return record.subCategory || '';
        }

        function getDisplayStatus(record) {
            const primary = getPrimaryName(record);
            const secondary = getSecondaryName(record);
            return secondary ? `${primary} / ${secondary}` : primary;
        }

        function appendRenameNote(record, oldName) {
            const existing = String(record.categoryRenameNote || '').trim();
            if (!oldName) return existing;
            const parts = existing ? existing.split(' / ').map(item => item.trim()).filter(Boolean) : [];
            if (!parts.includes(oldName)) {
                parts.push(oldName);
            }
            return parts.join(' / ');
        }

        function renameCategoryInRecords(oldName, newName) {
            let changed = false;
            timeRecords = timeRecords.map(record => {
                const primary = getPrimaryName(record);
                if (primary !== oldName) {
                    return record;
                }
                changed = true;
                return {
                    ...record,
                    status: newName,
                    category: newName,
                    categoryRenameNote: appendRenameNote(record, oldName)
                };
            });

            if (changed) {
                persistRecords();
            }
        }

        function getTagGroupByName(name) {
            return tagGroups.find(group => group.name === name) || null;
        }

        function getCurrentStatusLabel() {
            return currentSubStatus ? `${currentStatus} / ${currentSubStatus}` : currentStatus;
        }

        function isPendingPrimarySelectionActive(primaryStatus = currentStatus) {
            if (!primaryStatus || pendingPrimaryStatus !== primaryStatus || currentSubStatus) {
                return false;
            }
            const selectedAt = primarySelectedAt || (startTime ? startTime.getTime() : 0);
            if (!selectedAt) {
                return false;
            }
            return (Date.now() - selectedAt) <= SUBCATEGORY_GRACE_MS;
        }

        function syncCurrentStatusDisplay() {
            const statusEl = document.getElementById('currentStatus');
            if (!statusEl) return;
            if (!currentStatus) {
                statusEl.textContent = '未开始';
                return;
            }
            statusEl.textContent = isPendingPrimarySelectionActive()
                ? `${currentStatus} / 待选择二级标签`
                : getCurrentStatusLabel();
        }

        function persistRecords() {
            timeRecords = normalizeTimeRecords(timeRecords);
            localStorage.setItem('timeRecords', JSON.stringify(timeRecords));
        }

        function normalizeTimeRecords(records) {
            const sorted = [...records]
                .filter(record => record && record.start && record.end)
                .sort((a, b) => new Date(a.start) - new Date(b.start));

            const merged = [];
            const MERGE_GAP_MS = 5000;

            sorted.forEach(record => {
                const normalizedRecord = {
                    ...record,
                    category: getPrimaryName(record),
                    subCategory: getSecondaryName(record),
                    categoryRenameNote: record.categoryRenameNote || '',
                    duration: (new Date(record.end) - new Date(record.start)) / 1000
                };

                if (normalizedRecord.duration <= 0) {
                    return;
                }

                const last = merged[merged.length - 1];
                if (!last) {
                    merged.push(normalizedRecord);
                    return;
                }

                const samePrimary = getPrimaryName(last) === getPrimaryName(normalizedRecord);
                const sameSecondary = getSecondaryName(last) === getSecondaryName(normalizedRecord);
                const sameRenameNote = (last.categoryRenameNote || '') === (normalizedRecord.categoryRenameNote || '');
                const gapMs = new Date(normalizedRecord.start) - new Date(last.end);

                if (samePrimary && sameSecondary && sameRenameNote && gapMs >= 0 && gapMs <= MERGE_GAP_MS) {
                    last.end = normalizedRecord.end;
                    last.duration = (new Date(last.end) - new Date(last.start)) / 1000;
                    return;
                }

                merged.push(normalizedRecord);
            });

            return merged;
        }

        function persistTags() {
            localStorage.setItem('tagGroups', JSON.stringify(tagGroups));
        }

        function getTodayBounds() {
            const start = new Date();
            start.setHours(0, 0, 0, 0);
            const end = new Date(start);
            end.setDate(end.getDate() + 1);
            return { start, end };
        }

        function getRangeBounds(rangeKey) {
            const now = new Date();
            const end = new Date(now);
            end.setHours(23, 59, 59, 999);
            const start = new Date(now);
            start.setHours(0, 0, 0, 0);

            if (rangeKey === 'last3') {
                start.setDate(start.getDate() - 2);
            } else if (rangeKey === 'last5') {
                start.setDate(start.getDate() - 4);
            } else if (rangeKey === 'week') {
                const day = start.getDay();
                const offset = day === 0 ? 6 : day - 1;
                start.setDate(start.getDate() - offset);
            } else if (rangeKey === 'month') {
                start.setDate(1);
            }

            return { start, end };
        }

        function getRangeLabel(rangeKey) {
            const labels = {
                day: '今日',
                last3: '近三天',
                last5: '近五天',
                week: '本周',
                month: '本月'
            };
            return labels[rangeKey] || '今日';
        }

        function buildRecordInRange(record, start, end) {
            const recordStart = new Date(record.start);
            const recordEnd = new Date(record.end);
            if (recordEnd <= start || recordStart >= end) {
                return null;
            }
            const clippedStart = recordStart < start ? new Date(start) : recordStart;
            const clippedEnd = recordEnd > end ? new Date(end) : recordEnd;
            return {
                ...record,
                originalStart: record.originalStart || record.start,
                start: clippedStart.toISOString(),
                end: clippedEnd.toISOString(),
                duration: (clippedEnd - clippedStart) / 1000
            };
        }

        function getRecordsForRange(rangeKey) {
            const { start, end } = getRangeBounds(rangeKey);
            const scopedRecords = timeRecords
                .map(record => buildRecordInRange(record, start, end))
                .filter(Boolean);
            const activeRecord = getActiveRecord();
            if (activeRecord) {
                const scopedActive = buildRecordInRange(activeRecord, start, end);
                if (scopedActive) {
                    scopedRecords.push(scopedActive);
                }
            }
            return scopedRecords.sort((a, b) => new Date(b.start) - new Date(a.start));
        }

        function groupRecordsByDate(records) {
            const groups = new Map();
            records.forEach(record => {
                const date = new Date(record.start);
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                if (!groups.has(key)) {
                    groups.set(key, []);
                }
                groups.get(key).push(record);
            });
            return Array.from(groups.entries()).sort((a, b) => new Date(b[0]) - new Date(a[0]));
        }

        function getPrimaryTotals(records) {
            const totals = {};
            records.forEach(record => {
                const primary = getPrimaryName(record);
                totals[primary] = (totals[primary] || 0) + record.duration;
            });
            return Object.entries(totals).sort((a, b) => b[1] - a[1]);
        }

        function getSummaryGroups(records) {
            const primaryTotals = {};
            const subTotalsByPrimary = {};
            records.forEach(record => {
                const primary = getPrimaryName(record);
                const secondary = getSecondaryName(record);
                primaryTotals[primary] = (primaryTotals[primary] || 0) + record.duration;
                if (secondary) {
                    if (!subTotalsByPrimary[primary]) {
                        subTotalsByPrimary[primary] = {};
                    }
                    subTotalsByPrimary[primary][secondary] = (subTotalsByPrimary[primary][secondary] || 0) + record.duration;
                }
            });

            const totalDuration = Object.values(primaryTotals).reduce((sum, value) => sum + value, 0);
            return Object.entries(primaryTotals)
                .sort((a, b) => b[1] - a[1])
                .map(([primary, duration]) => ({
                    primary,
                    duration,
                    percent: totalDuration > 0 ? (duration / totalDuration) * 100 : 0,
                    children: Object.entries(subTotalsByPrimary[primary] || {})
                        .sort((a, b) => b[1] - a[1])
                        .map(([secondary, childDuration]) => ({
                            secondary,
                            duration: childDuration,
                            percent: duration > 0 ? (childDuration / duration) * 100 : 0
                        }))
                }));
        }

        function getActiveRecord(now = new Date()) {
            if (!startTime || !currentStatus) return null;
            if (now <= startTime) return null;
            return {
                status: currentStatus,
                category: currentStatus,
                subCategory: currentSubStatus || '',
                start: startTime.toISOString(),
                end: now.toISOString(),
                duration: (now - startTime) / 1000,
                isActive: true
            };
        }

        function getTodayRecords() {
            const { start, end } = getTodayBounds();
            const savedRecords = timeRecords.filter(record => {
                const recordStart = new Date(record.start);
                return recordStart >= start && recordStart < end;
            });
            const activeRecord = getActiveRecord();
            if (activeRecord && new Date(activeRecord.start) >= start) {
                savedRecords.push(activeRecord);
            }
            return savedRecords;
        }

        function syncRunningState() {
            if (startTime && currentStatus) {
                localStorage.setItem(BACKGROUND_START_KEY, startTime.toISOString());
                localStorage.setItem(BACKGROUND_STATUS_KEY, JSON.stringify({
                    category: currentStatus,
                    subCategory: currentSubStatus || '',
                    selectedAt: primarySelectedAt || 0
                }));
                localStorage.setItem(BACKGROUND_DATE_KEY, sessionDateStr);
                return;
            }
            localStorage.removeItem(BACKGROUND_START_KEY);
            localStorage.removeItem(BACKGROUND_STATUS_KEY);
            localStorage.removeItem(BACKGROUND_DATE_KEY);
        }

        function finalizeCurrentRecord(endTime = new Date(), options = {}) {
            if (!startTime || !currentStatus) return false;
            const { refresh = false, restartFromEnd = false } = options;
            if (endTime <= startTime) return false;

            saveRecord(currentStatus, startTime, endTime, {
                refresh,
                subCategory: currentSubStatus || ''
            });

            if (restartFromEnd) {
                startTime = new Date(endTime);
                sessionDateStr = getTodayDateString();
                if (currentSubStatus) {
                    primarySelectedAt = startTime.getTime();
                }
                syncRunningState();
            }

            return true;
        }

        function checkpointRunningRecord(now = new Date()) {
            if (!startTime || !currentStatus) {
                syncRunningState();
                return;
            }

            const nowMs = now.getTime();
            if (nowMs - lastCheckpointAt < 500) {
                syncRunningState();
                return;
            }

            if (now <= startTime) {
                syncRunningState();
                return;
            }

            lastCheckpointAt = nowMs;
            finalizeCurrentRecord(now, { refresh: false, restartFromEnd: true });
        }

        function init() {
            timeRecords = normalizeTimeRecords(timeRecords);
            persistRecords();
            updateVersionLabel();
            renderStatusButtons();
            updateStatusSelectOptions();
            recoverBackgroundState();
            startRealTimeClock();
            startTimer();
            registerServiceWorker();
            startUpdatePolling();
            loadTodayRecords();
            
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            const endTimeInput = document.getElementById('endTime');
            const startTimeInput = document.getElementById('startTime');
            if(endTimeInput) endTimeInput.value = now.toISOString().slice(0,16);
            if(startTimeInput) {
                const start = new Date(now.getTime() - 3600000);
                startTimeInput.value = start.toISOString().slice(0,16);
            }
            const rangeSelect = document.getElementById('rangeSelect');
            if (rangeSelect) {
                rangeSelect.value = currentRange;
            }
            console.log('App initialized with tags:', tagGroups);
        }

        function getTodayDateString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        }

        function recoverBackgroundState() {
            const bgStart = localStorage.getItem(BACKGROUND_START_KEY);
            const bgStatusRaw = localStorage.getItem(BACKGROUND_STATUS_KEY);
            const bgDate = localStorage.getItem(BACKGROUND_DATE_KEY);
            const todayStr = getTodayDateString();
            let bgStatus = '';
            let bgSubStatus = '';
            let bgSelectedAt = 0;

            if (bgStatusRaw) {
                try {
                    const parsedStatus = JSON.parse(bgStatusRaw);
                    if (parsedStatus && typeof parsedStatus === 'object') {
                        bgStatus = parsedStatus.category || parsedStatus.status || '';
                        bgSubStatus = parsedStatus.subCategory || '';
                        bgSelectedAt = Number(parsedStatus.selectedAt || 0);
                    } else {
                        bgStatus = String(parsedStatus || '');
                    }
                } catch (error) {
                    bgStatus = bgStatusRaw;
                }
            }
            
            if (bgStart && bgStatus) {
                const startObj = new Date(bgStart);
                sessionDateStr = todayStr;
                
                if (bgDate && bgDate !== todayStr) {
                    const endOfYesterday = new Date(startObj);
                    endOfYesterday.setHours(23, 59, 59, 999);
                    if (endOfYesterday > startObj) {
                         saveRecord(bgStatus, startObj, endOfYesterday, { refresh: false, subCategory: bgSubStatus });
                    }
                    const todayStart = new Date(todayStr + 'T00:00:00');
                    startTime = todayStart;
                    currentStatus = bgStatus;
                    currentSubStatus = bgSubStatus;
                    primarySelectedAt = todayStart.getTime();
                } else {
                    startTime = startObj;
                    currentStatus = bgStatus;
                    currentSubStatus = bgSubStatus;
                    primarySelectedAt = bgSelectedAt || startObj.getTime();
                }

                const statusEl = document.getElementById('currentStatus');
                if(statusEl) statusEl.textContent = getCurrentStatusLabel();
                highlightStatus(currentStatus, currentSubStatus);
                renderSubStatusButtons(currentStatus);
                syncRunningState();
            } else {
                sessionDateStr = todayStr;
            }
        }

        function highlightStatus(status, subStatus = '') {
             const btns = document.querySelectorAll('.status-btn[data-status]');
             btns.forEach(btn => {
                 btn.classList.toggle('active', btn.dataset.status === status);
             });
             const subBtns = document.querySelectorAll('.sub-status-btn[data-sub-status]');
             subBtns.forEach(btn => {
                 btn.classList.toggle('active', btn.dataset.subStatus === subStatus);
             });
        }

        function startRealTimeClock() {
            function updateRealTime() {
                const now = new Date();
                const rtEl = document.getElementById('realTime');
                const dateEl = document.getElementById('currentDate');
                if(rtEl) rtEl.textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
                if(dateEl) dateEl.textContent = now.toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
            }
            updateRealTime();
            realTimeInterval = setInterval(updateRealTime, 1000);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                try {
                    const now = new Date();
                    const currentStr = getTodayDateString();
                    if (sessionDateStr && currentStr !== sessionDateStr) {
                        handleDayChange(now);
                    }
                    updateTimerDisplay();
                    syncRunningState();
                    loadTodayRecords();
                } catch (e) { console.error('Timer loop error:', e); }
            }, 1000);
        }

        function handleDayChange(now) {
            if (!startTime || !currentStatus) return;
            const endOfYesterday = new Date(now);
            endOfYesterday.setHours(0, 0, 0, 0);
            endOfYesterday.setMilliseconds(-1);
            if (endOfYesterday > startTime) {
                finalizeCurrentRecord(endOfYesterday, { refresh: false });
            }
            const startOfToday = new Date(now);
            startOfToday.setHours(0, 0, 0, 0);
            startTime = startOfToday;
            primarySelectedAt = startOfToday.getTime();
            if (currentSubStatus) {
                pendingPrimaryStatus = '';
            }
            sessionDateStr = getTodayDateString();
            console.log('Auto day change handled.');
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            if (!timerEl) return;
            if (!startTime || !currentStatus) {
                timerEl.textContent = '00:00:00';
                return;
            }
            if (pendingPrimaryStatus && !isPendingPrimarySelectionActive()) {
                pendingPrimaryStatus = '';
                syncCurrentStatusDisplay();
                syncRunningState();
            }
            const elapsed = Math.floor((new Date() - startTime) / 1000);
            timerEl.textContent = formatDuration(elapsed);
        }

        function formatDuration(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(totalSeconds));
            const hours = Math.floor(safeSeconds / 3600);
            const minutes = Math.floor((safeSeconds % 3600) / 60);
            const seconds = safeSeconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function renderStatusButtons() {
            const container = document.getElementById('statusButtons');
            if(!container) return;
            container.innerHTML = '';
            const activePrimary = currentStatus;
            
            tagGroups.forEach(group => {
                const btn = document.createElement('button');
                btn.className = 'status-btn';
                btn.dataset.status = group.name;
                btn.textContent = group.name;
                btn.onclick = () => selectPrimaryStatus(group.name);
                if (group.name === activePrimary) {
                    btn.classList.add('active');
                }
                container.appendChild(btn);
            });
        }

        function renderSubStatusButtons(primaryStatus) {
            const panel = document.getElementById('subStatusPanel');
            const label = document.getElementById('subStatusLabel');
            const container = document.getElementById('subStatusButtons');
            if (!panel || !label || !container) return;

            const group = getTagGroupByName(primaryStatus);
            const subTags = group && Array.isArray(group.subTags) ? group.subTags : [];
            container.innerHTML = '';

            if (!primaryStatus || subTags.length === 0) {
                panel.classList.add('hidden');
                return;
            }

            label.textContent = `${primaryStatus} 的二级标签`;
            subTags.forEach(subTag => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'sub-status-btn';
                btn.dataset.subStatus = subTag;
                btn.textContent = subTag;
                btn.onclick = () => applySubStatus(primaryStatus, subTag);
                if (subTag === currentSubStatus && currentStatus === primaryStatus) {
                    btn.classList.add('active');
                }
                container.appendChild(btn);
            });

            panel.classList.remove('hidden');
        }

        function clearPrimaryPendingState(primaryStatus) {
            if (pendingPrimaryStatus === primaryStatus) {
                pendingPrimaryStatus = '';
            }
            if (currentStatus === primaryStatus && !getTagGroupByName(primaryStatus)?.subTags?.length) {
                currentSubStatus = '';
                primarySelectedAt = startTime ? startTime.getTime() : Date.now();
                syncCurrentStatusDisplay();
                syncRunningState();
            }
        }

        function updateStatusSelectOptions() {
            const sel = document.getElementById('statusSelect');
            const subSel = document.getElementById('subStatusSelect');
            if(!sel) return;
            sel.innerHTML = '<option value="">Select status</option>';
            tagGroups.forEach(group => {
                const op = document.createElement('option');
                op.value = group.name;
                op.textContent = group.name;
                sel.appendChild(op);
            });
            if (subSel) {
                updateSubStatusSelectOptions(sel.value);
            }
        }

        function updateSubStatusSelectOptions(primaryStatus, selectedValue = '') {
            const subSel = document.getElementById('subStatusSelect');
            if (!subSel) return;
            subSel.innerHTML = '<option value="">选择二级标签（可选）</option>';
            const group = getTagGroupByName(primaryStatus);
            const subTags = group && Array.isArray(group.subTags) ? group.subTags : [];
            subTags.forEach(subTag => {
                const op = document.createElement('option');
                op.value = subTag;
                op.textContent = subTag;
                if (subTag === selectedValue) {
                    op.selected = true;
                }
                subSel.appendChild(op);
            });
            subSel.disabled = subTags.length === 0;
        }

        window.selectPrimaryStatus = function(status) {
            const group = getTagGroupByName(status);
            const hasSubTags = group && Array.isArray(group.subTags) && group.subTags.length > 0;
            const now = new Date();

            finalizeCurrentRecord(now, { refresh: false });
            currentStatus = status;
            currentSubStatus = '';
            pendingPrimaryStatus = hasSubTags ? status : '';
            startTime = now;
            primarySelectedAt = now.getTime();
            sessionDateStr = getTodayDateString();

            const timerEl = document.getElementById('timer');
            syncCurrentStatusDisplay();
            if (timerEl) timerEl.textContent = '00:00:00';

            highlightStatus(status, '');
            renderSubStatusButtons(hasSubTags ? status : '');
            renderStatusButtons();
            syncRunningState();
            loadTodayRecords();
        }

        window.changeStatus = function(status, subStatus = '') {
            try {
                if (status === currentStatus && subStatus === currentSubStatus && startTime) {
                    return;
                }
                finalizeCurrentRecord(new Date(), { refresh: false });
                currentStatus = status;
                currentSubStatus = subStatus || '';
                pendingPrimaryStatus = '';
                startTime = new Date();
                primarySelectedAt = startTime.getTime();
                sessionDateStr = getTodayDateString();
                
                const timerEl = document.getElementById('timer');
                syncCurrentStatusDisplay();
                if(timerEl) timerEl.textContent = '00:00:00';
                
                highlightStatus(status, currentSubStatus);
                renderSubStatusButtons(status);
                syncRunningState();
                loadTodayRecords();
            } catch (e) {
                console.error('Change status error:', e);
                alert('Failed to switch status');
            }
        };

        window.applySubStatus = function(primaryStatus, subStatus) {
            try {
                const now = new Date();
                if (!startTime || currentStatus !== primaryStatus) {
                    changeStatus(primaryStatus, subStatus);
                    return;
                }
                if (currentSubStatus === subStatus) {
                    return;
                }

                const selectedAt = primarySelectedAt || startTime.getTime();
                const withinGrace = !currentSubStatus && (now.getTime() - selectedAt) <= SUBCATEGORY_GRACE_MS;

                if (withinGrace) {
                    currentSubStatus = subStatus;
                    pendingPrimaryStatus = '';
                    syncCurrentStatusDisplay();
                    highlightStatus(primaryStatus, currentSubStatus);
                    renderSubStatusButtons(primaryStatus);
                    syncRunningState();
                    loadTodayRecords();
                    return;
                }

                changeStatus(primaryStatus, subStatus);
            } catch (e) {
                console.error('Apply sub status error:', e);
                alert('Failed to set sub status');
            }
        };

        function saveRecord(status, start, end, options = {}) {
            const { refresh = true, subCategory = currentSubStatus || '' } = options;
            if (end <= start) return;
            const record = {
                status,
                category: status,
                subCategory,
                categoryRenameNote: '',
                start: start.toISOString(),
                end: end.toISOString(),
                duration: (end - start) / 1000
            };
            timeRecords.push(record);
            persistRecords();
            if (refresh) {
                loadTodayRecords();
            }
        }

        function loadTodayRecords() {
            try {
                const todayRecords = getTodayRecords();
                updateSummary(todayRecords);
                updateHistory(getRecordsForRange(currentRange));
            } catch (e) {
                console.error('Load records error:', e);
            }
        }

        function updateSummary(records) {
            const accordion = document.getElementById('summaryAccordion');
            if (!accordion) return;
            accordion.innerHTML = '';

            const groups = getSummaryGroups(records);
            if (groups.length === 0) {
                accordion.innerHTML = '<div class="empty-state">今天还没有统计数据</div>';
                return;
            }

            groups.forEach(group => {
                const wrapper = document.createElement('div');
                const shouldExpand = expandedSummaryGroups.has(group.primary) && group.children.length > 0;
                wrapper.className = `summary-group${shouldExpand ? ' expanded' : ''}`;
                const childrenHtml = group.children.length > 0
                    ? group.children.map(child => `
                        <div class="summary-subitem">
                            <div class="summary-subname">${child.secondary}</div>
                            <div class="summary-subtime">${formatDuration(child.duration)}</div>
                            <div class="summary-subpercent">${child.percent.toFixed(1)}%</div>
                        </div>
                    `).join('')
                    : '<div class="empty-state" style="padding:16px 0 4px;">这个一级标签下还没有二级拆分记录</div>';

                wrapper.dataset.group = group.primary;
                wrapper.innerHTML = `
                    <button type="button" class="summary-group-header" onclick="toggleSummaryGroup(this.parentElement)">
                        <div class="summary-group-name">${group.primary}</div>
                        <div class="summary-group-time">${formatDuration(group.duration)}</div>
                        <div class="summary-group-percent">${group.percent.toFixed(1)}%</div>
                        <div class="summary-group-toggle">${group.children.length > 0 ? (shouldExpand ? '收起细分' : '查看细分') : '暂无细分'}</div>
                        <div class="summary-group-arrow">⌄</div>
                    </button>
                    <div class="summary-group-body">${childrenHtml}</div>
                `;
                accordion.appendChild(wrapper);
            });
        }

        function updateHistory(records) {
            updateHistoryMetrics(records);
            renderHistoryChart(records);
            renderHistoryGroups(records);
        }

        function updateHistoryMetrics(records) {
            const rangeLabel = document.getElementById('rangeLabel');
            const rangeTotal = document.getElementById('rangeTotal');
            const rangeCount = document.getElementById('rangeCount');
            const historySectionTitle = document.getElementById('historySectionTitle');
            if (rangeLabel) rangeLabel.textContent = getRangeLabel(currentRange);
            if (rangeTotal) {
                const total = records.reduce((sum, record) => sum + record.duration, 0);
                rangeTotal.textContent = formatDuration(total);
            }
            if (rangeCount) rangeCount.textContent = String(records.length);
            if (historySectionTitle) historySectionTitle.textContent = `${getRangeLabel(currentRange)}记录明细`;
        }

        function renderHistoryChart(records) {
            const container = document.getElementById('chartContainer');
            if (!container) return;

            const totals = getPrimaryTotals(records);
            if (totals.length === 0) {
                container.innerHTML = '<div class="empty-state">当前范围内还没有可展示的数据</div>';
                return;
            }

            container.innerHTML = currentChartType === 'pie'
                ? renderPieChartMarkup(totals)
                : renderBarChartMarkup(totals);
        }

        function renderBarChartMarkup(totals) {
            const maxValue = totals[0]?.[1] || 1;
            const rows = totals.map(([label, duration], index) => {
                const percent = maxValue > 0 ? (duration / maxValue) * 100 : 0;
                return `
                    <div class="bar-row">
                        <div class="bar-label">${label}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width:${percent}%;background:${CHART_COLORS[index % CHART_COLORS.length]};"></div>
                        </div>
                        <div class="bar-value">${formatDuration(duration)}</div>
                    </div>
                `;
            }).join('');

            return `<div class="bar-chart">${rows}</div>`;
        }

        function renderPieChartMarkup(totals) {
            const total = totals.reduce((sum, [, duration]) => sum + duration, 0);
            let currentDeg = 0;
            const segments = totals.map(([label, duration], index) => {
                const span = total > 0 ? (duration / total) * 360 : 0;
                const color = CHART_COLORS[index % CHART_COLORS.length];
                const start = currentDeg;
                currentDeg += span;
                return { label, duration, color, start, end: currentDeg };
            });

            const gradient = segments.map(segment => `${segment.color} ${segment.start}deg ${segment.end}deg`).join(', ');
            const legend = segments.map(segment => `
                <div class="legend-item">
                    <span class="legend-dot" style="background:${segment.color};"></span>
                    <span class="legend-label">${segment.label}</span>
                    <span class="legend-value">${formatDuration(segment.duration)}</span>
                </div>
            `).join('');

            return `
                <div class="pie-wrap">
                    <div class="pie-chart" style="background:conic-gradient(${gradient});">
                        <div class="pie-center">
                            <div class="pie-total-label">总时长</div>
                            <div class="pie-total-value">${formatDuration(total)}</div>
                        </div>
                    </div>
                    <div class="chart-legend">${legend}</div>
                </div>
            `;
        }

        function renderHistoryGroups(records) {
            const container = document.getElementById('historyGroups');
            if (!container) return;
            const groups = groupRecordsByDate(records);
            if (groups.length === 0) {
                container.innerHTML = '<div class="empty-state">当前范围内还没有记录</div>';
                return;
            }

            container.innerHTML = groups.map(([dateKey, items]) => {
                const listHtml = items.map(record => {
                    const s = new Date(record.start);
                    const e = new Date(record.end);
                    const timeStr = `${s.getHours().toString().padStart(2,'0')}:${s.getMinutes().toString().padStart(2,'0')} - ${e.getHours().toString().padStart(2,'0')}:${e.getMinutes().toString().padStart(2,'0')}`;
                    const actionHtml = record.isActive
                        ? '<span style="color:#10B981;font-size:0.85rem;font-weight:700;">进行中</span>'
                        : `<button class="delete-btn" onclick="deleteRecord('${record.originalStart || record.start}')">&times;</button>`;
                    return `
                        <li class="history-item">
                            <div class="history-info">
                                <div class="history-time">${timeStr} <span style="font-weight:normal; color:#666;">(${formatDuration(record.duration)})</span></div>
                                <div class="history-status">${getDisplayStatus(record)}</div>
                            </div>
                            ${actionHtml}
                        </li>
                    `;
                }).join('');

                const displayDate = new Date(`${dateKey}T00:00:00`).toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
                return `
                    <div>
                        <div class="history-group-title">${displayDate}</div>
                        <ul class="history-list">${listHtml}</ul>
                    </div>
                `;
            }).join('');
        }

        window.deleteRecord = function(startIso) {
            if(confirm('Delete this record?')) {
                timeRecords = timeRecords.filter(r => r.start !== startIso);
                persistRecords();
                loadTodayRecords();
            }
        };

        window.openTagManager = function() {
            const modal = document.getElementById('tagModal');
            const container = document.getElementById('tagListContainer');
            if(!modal || !container) return;
            
            container.innerHTML = '';
            tagGroups.forEach((group, index) => {
                const item = document.createElement('div');
                item.className = 'tag-item';
                const isDefault = index < DEFAULT_TAG_GROUPS.length;
                const subTagHtml = (group.subTags || []).map((subTag, subIndex) => `
                    <span class="subtag-chip">
                        ${subTag}
                        <button type="button" onclick="deleteSubTag(${index}, ${subIndex})">&times;</button>
                    </span>
                `).join('');
                
                item.innerHTML = `
                    <div style="width:100%;">
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
                            <input type="text" value="${group.name}" id="tag-input-${index}" ${isDefault ? 'placeholder="Built-in tag"' : ''}>
                            <div class="tag-actions">
                                <button class="btn-tag-action btn-save-tag" onclick="saveTagChange(${index})">保存</button>
                                ${tagGroups.length > 1 ? `<button class="btn-tag-action btn-del-tag" onclick="deleteTag(${index})">删除</button>` : ''}
                            </div>
                        </div>
                        <div class="subtag-group">
                            <div style="font-size:0.78rem;color:#6B7280;">二级标签</div>
                            <div class="subtag-list">${subTagHtml || '<span style="font-size:0.78rem;color:#9CA3AF;">暂无二级标签</span>'}</div>
                            <div class="subtag-add">
                                <input type="text" id="subtag-input-${index}" placeholder="新增二级标签">
                                <button class="btn-tag-action btn-save-tag" onclick="addSubTag(${index})">添加</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
            
            modal.classList.add('active');
        };

        window.closeTagManager = function() {
            document.getElementById('tagModal').classList.remove('active');
            renderStatusButtons();
            updateStatusSelectOptions();
        };

        window.saveTagChange = function(index) {
            const input = document.getElementById(`tag-input-${index}`);
            if(!input) return;
            const newVal = input.value.trim();
            const oldVal = tagGroups[index].name;
            if(!newVal) {
                alert('Tag name is required');
                return;
            }
            if (newVal !== oldVal && tagGroups.some(group => group.name === newVal)) {
                alert('Tag name must be unique');
                return;
            }
            
            tagGroups[index].name = newVal;
            renameCategoryInRecords(oldVal, newVal);
            if (currentStatus === oldVal) {
                currentStatus = newVal;
                const statusEl = document.getElementById('currentStatus');
                if (statusEl) statusEl.textContent = getCurrentStatusLabel();
                syncRunningState();
            }
            persistTags();
            
            alert('Tag updated. Future records will use the new name.');
            renderStatusButtons();
            updateStatusSelectOptions();
            openTagManager();
        };

        window.deleteTag = function(index) {
            const tagName = tagGroups[index].name;
            if (tagName === currentStatus) {
                alert('Switch away from the active tag before deleting it.');
                return;
            }
            if(confirm('Delete this tag? Historical records will be kept.')) {
                tagGroups.splice(index, 1);
                if (tagGroups.length === 0) {
                    tagGroups = cloneDefaultTagGroups();
                }
                persistTags();
                openTagManager();
                renderStatusButtons();
                updateStatusSelectOptions();
            }
        };

        window.addNewTagFromManager = function() {
            const input = document.getElementById('newTagName');
            if(!input) return;
            const val = input.value.trim();
            if(!val) return;
            if(tagGroups.some(group => group.name === val)) {
                alert('Tag already exists');
                return;
            }
            
            tagGroups.push({ name: val, subTags: [] });
            persistTags();
            input.value = '';
            openTagManager();
            renderStatusButtons();
            updateStatusSelectOptions();
        };

        window.addSubTag = function(groupIndex) {
            const input = document.getElementById(`subtag-input-${groupIndex}`);
            if (!input) return;
            const value = input.value.trim();
            if (!value) return;
            const group = tagGroups[groupIndex];
            if (!group) return;
            if ((group.subTags || []).includes(value)) {
                alert('二级标签不能重复');
                return;
            }
            group.subTags = group.subTags || [];
            group.subTags.push(value);
            persistTags();
            input.value = '';
            openTagManager();
            renderStatusButtons();
            updateStatusSelectOptions();
            if (currentStatus === group.name) {
                renderSubStatusButtons(group.name);
            }
        };

        window.deleteSubTag = function(groupIndex, subIndex) {
            const group = tagGroups[groupIndex];
            if (!group || !Array.isArray(group.subTags)) return;
            const subTagName = group.subTags[subIndex];
            if (currentStatus === group.name && currentSubStatus === subTagName) {
                alert('当前正在使用这个二级标签，请先切换状态。');
                return;
            }
            group.subTags.splice(subIndex, 1);
            persistTags();
            openTagManager();
            clearPrimaryPendingState(group.name);
            renderStatusButtons();
            updateStatusSelectOptions();
            if (currentStatus === group.name || pendingPrimaryStatus === group.name) {
                if (currentSubStatus === subTagName) {
                    currentSubStatus = '';
                }
                const statusEl = document.getElementById('currentStatus');
                if (statusEl) statusEl.textContent = getCurrentStatusLabel() || '未开始';
                renderSubStatusButtons(group.name);
                highlightStatus(currentStatus, currentSubStatus);
                if (!group.subTags.length) {
                    renderSubStatusButtons('');
                }
            }
        };

        window.toggleSummaryGroup = function(element) {
            if (!element) return;
            if (!element.querySelector('.summary-group-body')) return;
            element.classList.toggle('expanded');
            const groupName = element.dataset.group;
            if (groupName) {
                if (element.classList.contains('expanded')) {
                    expandedSummaryGroups.add(groupName);
                } else {
                    expandedSummaryGroups.delete(groupName);
                }
            }
            const toggleLabel = element.querySelector('.summary-group-toggle');
            const hasChildren = element.querySelector('.summary-subitem');
            if (toggleLabel && hasChildren) {
                toggleLabel.textContent = element.classList.contains('expanded') ? '收起细分' : '查看细分';
            }
        };

        window.setChartType = function(type) {
            currentChartType = type;
            document.getElementById('chart-bar')?.classList.toggle('active', type === 'bar');
            document.getElementById('chart-pie')?.classList.toggle('active', type === 'pie');
            updateHistory(getRecordsForRange(currentRange));
        };

        window.switchView = function(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tool-btn').forEach(el => el.classList.remove('active'));
            const viewEl = document.getElementById(`view-${viewName}`);
            const navEl = document.getElementById(`nav-${viewName}`);
            if(viewEl) viewEl.classList.add('active');
            if(navEl) navEl.classList.add('active');
            loadTodayRecords();
        };

        function escapeCsvField(value) {
            return `"${String(value).replace(/"/g, '""')}"`;
        }

        window.exportToCSV = function() {
            const exportRecords = [...timeRecords];
            const activeRecord = getActiveRecord();
            if (activeRecord) {
                exportRecords.push(activeRecord);
            }

            if (exportRecords.length === 0) {
                alert('No data to export');
                return;
            }
            let csvContent = 'data:text/csv;charset=utf-8,\uFEFF';
            csvContent += 'Primary Category,Secondary Category,Legacy Category Note,Start Time,End Time,Duration Seconds,Duration Formatted\n';
            const sortedRecords = exportRecords.sort((a, b) => new Date(a.start) - new Date(b.start));
            sortedRecords.forEach(function(row) {
                const startDate = new Date(row.start);
                const endDate = new Date(row.end);
                const formatTime = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
                const rowStr = [
                    escapeCsvField(getPrimaryName(row)),
                    escapeCsvField(getSecondaryName(row)),
                    escapeCsvField(row.categoryRenameNote || ''),
                    escapeCsvField(formatTime(startDate)),
                    escapeCsvField(formatTime(endDate)),
                    escapeCsvField(row.duration),
                    escapeCsvField(formatDuration(row.duration))
                ].join(',');
                csvContent += rowStr + '\n';
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
            link.setAttribute('href', encodedUri);
            link.setAttribute('download', `time-records_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('manualForm');
            const statusSelect = document.getElementById('statusSelect');
            const rangeSelect = document.getElementById('rangeSelect');
            if (statusSelect) {
                statusSelect.addEventListener('change', function() {
                    updateSubStatusSelectOptions(this.value);
                });
            }
            if (rangeSelect) {
                rangeSelect.addEventListener('change', function() {
                    currentRange = this.value;
                    updateHistory(getRecordsForRange(currentRange));
                });
            }
            if(form) {
                form.addEventListener('submit', function(e){
                    e.preventDefault();
                    const sVal = document.getElementById('startTime').value;
                    const eVal = document.getElementById('endTime').value;
                    const st = document.getElementById('statusSelect').value;
                    const subSt = document.getElementById('subStatusSelect').value;
                    if(!sVal || !eVal || !st) { alert('请填写完整信息'); return; }
                    const s = new Date(sVal);
                    const en = new Date(eVal);
                    if(s >= en) { alert('结束时间必须晚于开始时间'); return; }
                    timeRecords.push({
                        status: st,
                        category: st,
                        subCategory: subSt || '',
                        categoryRenameNote: '',
                        start: s.toISOString(),
                        end: en.toISOString(),
                        duration: (en - s) / 1000
                    });
                    persistRecords();
                    loadTodayRecords();
                    this.reset();
                    updateSubStatusSelectOptions('');
                    alert('添加成功！');
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    const endInput = document.getElementById('endTime');
                    if(endInput) endInput.value = now.toISOString().slice(0,16);
                });
            }
        });

        window.onload = init;

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    serviceWorkerRegistration = registration;

                    if (registration.waiting) {
                        handleServiceWorkerUpdate(registration.waiting);
                    }

                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                handleServiceWorkerUpdate(newWorker);
                            }
                        });
                    });

                    navigator.serviceWorker.addEventListener('controllerchange', () => {
                        window.location.reload();
                    });

                    console.log('SW OK');
                }).catch(e=>console.error(e));
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                checkpointRunningRecord(new Date());
            }
        });

        window.addEventListener('beforeunload', () => {
            checkpointRunningRecord(new Date());
        });
    </script>
</body>
</html>
