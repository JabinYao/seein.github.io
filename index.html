<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间追踪工具</title>
    <style>
        :root {
            --primary: #4169E1;
            --primary-light: #87CEFA;
            --text: #333333;
            --text-light: #666666;
            --bg: #f5f5f5;
            --white: #ffffff;
            --border: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* 顶部导航栏 */
        .header {
            background-color: var(--primary);
            color: var(--white);
            padding: 20px 16px;
            text-align: center;
            position: relative; /* 新增：用于齿轮定位 */
        }
        
        .header .time {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .header .date {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* 右上角齿轮按钮 */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 主容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        
        /* 状态卡片 */
        .status-card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        
        .current-status-label {
            font-size: 0.9rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 8px;
        }
        
        .current-status {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .timer {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
            color: var(--text);
        }
        
        /* 状态按钮 */
        .status-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .status-btn {
            background: var(--white);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .status-btn:active {
            transform: scale(0.95);
        }
        
        .status-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(65, 105, 225, 0.3);
        }
        
        /* 二级标签样式 */
        .subtag-container {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }
        
        .current-subtag-label {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }
        
        .subtag-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .subtag-btn {
            background: white;
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }
        
        .subtag-btn:active {
            transform: scale(0.95);
        }
        
        .subtag-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(65, 105, 225, 0.3);
        }
        
        .btn-manage-subtag {
            background: #F9FAFB;
            border: 1px dashed var(--border);
            color: var(--text-light);
            font-size: 0.85rem;
            padding: 10px;
            grid-column: span 3;
            margin-top: 5px;
        }
        
        .btn-manage-subtag:active {
            background: #E5E7EB;
        }
        
        .custom-input-container {
            display: none;
            margin-top: 15px;
        }
        
        .input-group {
            display: flex;
            gap: 8px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 统计区域 */
        .stats-card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        
        .stats-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 16px;
            color: var(--text);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        td {
            font-size: 0.9rem;
        }
        
        .text-right {
            text-align: right;
        }
        
        .font-bold {
            font-weight: bold;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
        }
        
        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.75rem;
        }
        
        .tool-btn.active {
            color: var(--primary);
        }
        
        .tool-btn svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--white);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }
        
        /* 设置菜单模态框 */
        .settings-modal {
            background: var(--white);
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }
        
        .settings-menu {
            list-style: none;
        }
        
        .settings-menu-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .settings-menu-item:last-child {
            border-bottom: none;
        }
        
        .settings-menu-item:hover {
            background-color: #f5f5f5;
            border-radius: 8px;
        }
        
        .tag-list {
            margin: 16px 0;
        }
        
        .tag-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        
        .tag-item input {
            flex: 1;
        }
        
        .tag-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-tag-action {
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-save-tag {
            background: var(--primary);
            color: white;
        }
        
        .btn-del-tag {
            background: #ff4444;
            color: white;
        }
        
        /* 历史记录 */
        .history-list {
            list-style: none;
            margin-top: 16px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
        }
        
        .history-info {
            flex: 1;
        }
        
        .history-time {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        
        .history-status {
            font-size: 0.95rem;
            font-weight: 600;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1rem;
        }
        
        /* 视图切换 */
        .view-section {
            display: none;
        }
        
        .view-section.active {
            display: block;
        }
        
        /* 导出按钮 */
        .export-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <!-- 顶部头部（新增齿轮按钮） -->
    <div class="header">
        <button class="settings-btn" onclick="openSettingsMenu()">⚙️</button>
        <div class="time" id="currentTime">00:00:00</div>
        <div class="date" id="currentDate">2026年3月19日星期四</div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 计时视图 -->
        <div class="view-section active" id="view-timer">
            <!-- 状态卡片（移除管理标签按钮） -->
            <div class="status-card">
                <div class="current-status-label">当前状态</div>
                <div class="current-status" id="currentStatus">未开始</div>
                <div class="timer" id="timerDisplay">00:00:00</div>
                
                <!-- 一级状态按钮 -->
                <div class="status-buttons" id="statusButtons">
                    <!-- 动态生成 -->
                </div>
                
                <!-- 二级标签容器 -->
                <div class="subtag-container" id="subtagContainer">
                    <div class="current-subtag-label">二级明细</div>
                    <div class="subtag-buttons" id="subtagButtons">
                        <!-- 动态生成 -->
                    </div>
                    <button class="status-btn btn-manage-subtag" onclick="openSubtagManager()">
                        ✏️ 管理二级标签
                    </button>
                    <div class="custom-input-container" id="subtagCustomInput">
                        <div class="input-group">
                            <input type="text" id="newSubtagName" placeholder="输入新二级标签...">
                            <button class="btn-add" onclick="addNewSubtagFromManager()">添加</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 今日统计 -->
            <div class="stats-card">
                <div class="stats-title">今日统计</div>
                <table>
                    <thead>
                        <tr>
                            <th>状态</th>
                            <th class="text-right">时长</th>
                            <th class="text-right">占比</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
                <button class="export-btn" onclick="exportToCSV()">📥 导出今日记录CSV</button>
            </div>
        </div>

        <!-- 历史记录视图 -->
        <div class="view-section" id="view-history">
            <div class="stats-card">
                <div class="stats-title">今日历史记录</div>
                <ul class="history-list" id="historyList">
                    <!-- 动态生成 -->
                </ul>
                <button class="export-btn" onclick="exportToCSV()">📥 导出全部记录CSV</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="javascript:void(0)" class="tool-btn active" id="nav-timer" onclick="switchView('timer')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
            <span>计时</span>
        </a>
        <a href="javascript:void(0)" class="tool-btn" id="nav-history" onclick="switchView('history')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8z"/>
            </svg>
            <span>历史</span>
        </a>
    </div>

    <!-- 设置菜单模态框 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal settings-modal">
            <div class="modal-header">
                <div class="modal-title">设置菜单</div>
                <button class="close-modal" onclick="closeSettingsMenu()">&times;</button>
            </div>
            <ul class="settings-menu">
                <li class="settings-menu-item" onclick="openTagManager()">
                    📝 管理一级状态标签
                </li>
                <li class="settings-menu-item" onclick="openSubtagManager()">
                    📌 管理二级明细标签
                </li>
                <li class="settings-menu-item" onclick="exportAllRecordsCSV()">
                    📥 导出全部历史记录
                </li>
                <li class="settings-menu-item" onclick="clearAllRecords()" style="color: #ff4444;">
                    🗑️ 清空所有记录（谨慎）
                </li>
            </ul>
        </div>
    </div>

    <!-- 一级标签管理模态框 -->
    <div class="modal-overlay" id="tagModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">管理状态标签</div>
                <button class="close-modal" onclick="closeTagManager()">&times;</button>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 15px;">
                💡 提示：修改标签名会保留历史名称为曾用名，不影响已有记录
            </p>
            <div class="tag-list" id="tagListContainer">
                <!-- 动态生成 -->
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <input type="text" id="newTagInput" placeholder="新标签名称... " style="flex:1;">
                <button class="btn-add" onclick="addNewTag()">添加</button>
            </div>
        </div>
    </div>

    <!-- 二级标签管理模态框 -->
    <div class="modal-overlay" id="subtagModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">管理二级标签</div>
                <button class="close-modal" onclick="closeSubtagManager()">&times;</button>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 15px;">
                💡 提示：为一级标签绑定二级标签，仅影响未来的记录。
            </p>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.9rem; color: var(--text-light); margin-right: 10px;">绑定到一级标签：</label>
                <select id="mainTagSelect" required>
                    <option value="">选择一级标签</option>
                </select>
            </div>
            <div class="tag-list" id="subtagListContainer">
                <!-- 动态生成 -->
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <input type="text" id="newSubtagInput" placeholder="新二级标签名称... " style="flex:1;">
                <button class="btn-add" onclick="addNewSubtag()">添加</button>
            </div>
        </div>
    </div>

    <script>
        // ===================== 全局变量 =====================
        // 默认一级标签（适配你的标签体系）
        const DEFAULT_TAGS = [
            { id: 'tag_1', name: '处理工作', aliases: [] },
            { id: 'tag_2', name: '学习研究', aliases: [] },
            { id: 'tag_3', name: '运动健身', aliases: [] },
            { id: 'tag_4', name: '休息睡觉', aliases: [] },
            { id: 'tag_5', name: '主动娱乐', aliases: [] },
            { id: 'tag_6', name: '碎片泄露', aliases: [] }
        ];

        // 默认二级标签（按一级标签分组）
        const DEFAULT_SUBTAGS = {
            '处理工作': ['开会', '写文档', '对接需求', '处理邮件', '编程开发'],
            '学习研究': ['学英语', '看书', '写代码', '查资料', '网课学习'],
            '运动健身': ['跑步', '健身', '瑜伽', '打球', '游泳'],
            '休息睡觉': ['午睡', '夜间睡眠', '发呆', '散步', '冥想'],
            '主动娱乐': ['看电影', '玩游戏', '听音乐', '追剧', '手工'],
            '碎片泄露': ['刷短视频', '无目的浏览', '闲聊', '等待', '其他']
        };

        // 存储键定义
        const TAGS_V2_KEY = 'statusTagsV2';
        const SUBTAGS_KEY = 'subTags';
        const TIME_RECORDS_V2_KEY = 'timeRecordsV2';
        const BACKGROUND_START_KEY = 'bgStart';
        const BACKGROUND_STATUS_KEY = 'bgStatus';
        const BACKGROUND_SUBTAG_KEY = 'bgSubtag';
        const BACKGROUND_DATE_KEY = 'bgDate';

        // 全局状态
        let statusTags = [];          // 一级标签列表（带ID）
        let subTags = {};             // 二级标签映射
        let timeRecords = [];         // 时间记录
        let currentStatus = '';       // 当前一级标签ID
        let currentSubtag = '';       // 当前二级标签名称
        let startTime = null;         // 计时开始时间
        let timerInterval = null;     // 计时器
        let sessionDateStr = '';      // 当前会话日期

        // ===================== 初始化 =====================
        window.onload = function() {
            // 初始化日期和时间显示
            updateDateTime();
            setInterval(updateDateTime, 1000);

            // 初始化数据
            initTags();
            initSubTags();
            initRecords();
            recoverBackgroundState();
            
            // 渲染UI
            renderStatusButtons();
            updateSummary();
            renderHistoryList();
        };

        // 初始化一级标签（兼容旧数据）
        function initTags() {
            const oldTags = JSON.parse(localStorage.getItem('statusTags') || '[]');
            const savedTags = JSON.parse(localStorage.getItem(TAGS_V2_KEY) || '[]');
            
            // 旧数据迁移：字符串数组 → 带ID的对象数组
            if (oldTags.length > 0 && savedTags.length === 0) {
                const migratedTags = oldTags.map((name, index) => ({
                    id: `tag_${index + 1}`,
                    name,
                    aliases: []
                }));
                localStorage.setItem(TAGS_V2_KEY, JSON.stringify(migratedTags));
                localStorage.removeItem('statusTags');
                statusTags = migratedTags;
            } else if (savedTags.length > 0) {
                statusTags = savedTags;
            } else {
                statusTags = [...DEFAULT_TAGS];
                localStorage.setItem(TAGS_V2_KEY, JSON.stringify(statusTags));
            }
        }

        // 初始化二级标签
        function initSubTags() {
            const savedSubTags = JSON.parse(localStorage.getItem(SUBTAGS_KEY) || '[]');
            if (Object.keys(savedSubTags).length > 0) {
                subTags = savedSubTags;
            } else {
                subTags = {...DEFAULT_SUBTAGS};
                localStorage.setItem(SUBTAGS_KEY, JSON.stringify(subTags));
            }
        }

        // 初始化记录（兼容旧数据）
        function initRecords() {
            const oldRecords = JSON.parse(localStorage.getItem('timeRecords') || '[]');
            const savedRecords = JSON.parse(localStorage.getItem(TIME_RECORDS_V2_KEY) || '[]');
            
            // 旧数据迁移
            if (oldRecords.length > 0 && savedRecords.length === 0) {
                const newRecords = oldRecords.map(record => {
                    // 匹配旧名称对应的标签ID
                    const matchedTag = statusTags.find(tag => tag.name === record.status) || statusTags[0];
                    return {
                        id: Date.now() + Math.floor(Math.random() * 1000),
                        tagId: matchedTag.id,
                        subtag: record.subtag || '',
                        start: record.start,
                        end: record.end,
                        duration: record.duration,
                        date: record.date,
                        originalName: record.status
                    };
                });
                localStorage.setItem(TIME_RECORDS_V2_KEY, JSON.stringify(newRecords));
                localStorage.removeItem('timeRecords');
                timeRecords = newRecords;
            } else if (savedRecords.length > 0) {
                timeRecords = savedRecords;
            } else {
                timeRecords = [];
            }
        }

        // 恢复后台状态
        function recoverBackgroundState() {
            const bgStart = localStorage.getItem(BACKGROUND_START_KEY);
            const bgStatusId = localStorage.getItem(BACKGROUND_STATUS_KEY);
            const bgDate = localStorage.getItem(BACKGROUND_DATE_KEY);
            const bgSubtag = localStorage.getItem(BACKGROUND_SUBTAG_KEY);
            const todayStr = getTodayDateString();
            
            if (bgStart && bgStatusId) {
                const startObj = new Date(bgStart);
                sessionDateStr = todayStr; 
                
                if (bgDate && bgDate !== todayStr) {
                    const endOfYesterday = new Date(startObj);
                    endOfYesterday.setHours(23, 59, 59, 999);
                    if (endOfYesterday > startObj) {
                        saveRecord(bgStatusId, startObj, endOfYesterday, bgSubtag);
                    }
                    const todayStart = new Date(todayStr + 'T00:00:00');
                    startTime = todayStart;
                    currentStatus = bgStatusId;
                    currentSubtag = bgSubtag || '';
                } else {
                    startTime = startObj;
                    currentStatus = bgStatusId;
                    currentSubtag = bgSubtag || '';
                }

                // 更新UI
                const statusName = getTagNameById(currentStatus);
                const statusEl = document.getElementById('currentStatus');
                if(statusEl) {
                    statusEl.textContent = currentSubtag ? `${statusName} - ${currentSubtag}` : statusName;
                }
                highlightStatus(currentStatus);
                highlightSubtag(currentSubtag);
                showSubtagContainer(statusName);
                
                // 启动计时器
                startTimer();
            } else {
                sessionDateStr = todayStr;
            }
        }

        // ===================== UI更新 =====================
        // 更新日期时间显示
        function updateDateTime() {
            const now = new Date();
            // 更新当前时间
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            // 更新当前日期
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            // 更新计时器
            if (startTime) {
                updateTimerDisplay();
            }
        }

        // 渲染一级状态按钮
        function renderStatusButtons() {
            const container = document.getElementById('statusButtons');
            container.innerHTML = '';
            
            statusTags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `status-btn ${currentStatus === tag.id ? 'active' : ''}`;
                btn.dataset.tagId = tag.id;
                btn.textContent = tag.name;
                btn.onclick = () => selectStatus(tag.id);
                container.appendChild(btn);
            });
        }

        // 显示二级标签容器
        function showSubtagContainer(mainTagName) {
            const container = document.getElementById('subtagContainer');
            const subtagButtons = document.getElementById('subtagButtons');
            if (!container || !subtagButtons) return;
            
            subtagButtons.innerHTML = '';
            const subtags = subTags[mainTagName] || [];
            
            if (subtags.length > 0) {
                container.style.display = 'block';
                subtags.forEach(subtag => {
                    const btn = document.createElement('button');
                    btn.className = `subtag-btn ${currentSubtag === subtag ? 'active' : ''}`;
                    btn.dataset.subtag = subtag;
                    btn.textContent = subtag;
                    btn.onclick = () => selectSubtag(subtag);
                    subtagButtons.appendChild(btn);
                });
            } else {
                container.style.display = 'none';
            }
        }

        // 高亮当前一级标签
        function highlightStatus(tagId) {
            const btns = document.querySelectorAll('.status-btn[data-tag-id]');
            btns.forEach(btn => {
                if (btn.dataset.tagId === tagId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 高亮当前二级标签
        function highlightSubtag(subtag) {
            const btns = document.querySelectorAll('.subtag-btn[data-subtag]');
            btns.forEach(btn => {
                if (btn.dataset.subtag === subtag) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            if (!startTime) return;
            const now = new Date();
            const diff = now - startTime;
            
            const hours = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const minutes = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const seconds = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            
            document.getElementById('timerDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // 启动计时器
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimerDisplay, 1000);
            
            // 保存到本地存储（防止页面刷新/后台切换丢失）
            localStorage.setItem(BACKGROUND_START_KEY, startTime.toISOString());
            localStorage.setItem(BACKGROUND_STATUS_KEY, currentStatus);
            localStorage.setItem(BACKGROUND_SUBTAG_KEY, currentSubtag);
            localStorage.setItem(BACKGROUND_DATE_KEY, sessionDateStr);
        }

        // ===================== 核心功能 =====================
        // 选择一级标签
        function selectStatus(tagId) {
            // 停止当前计时并保存记录
            if (startTime && currentStatus) {
                const endTime = new Date();
                saveRecord(currentStatus, startTime, endTime, currentSubtag);
                currentSubtag = '';
                localStorage.removeItem(BACKGROUND_SUBTAG_KEY);
            }

            // 更新状态
            currentStatus = tagId;
            startTime = new Date();
            sessionDateStr = getTodayDateString();
            
            // 更新UI
            const statusName = getTagNameById(tagId);
            const statusEl = document.getElementById('currentStatus');
            if (statusEl) {
                statusEl.textContent = statusName;
            }
            
            highlightStatus(tagId);
            showSubtagContainer(statusName);
            highlightSubtag('');
            startTimer();
        }

        // 选择二级标签
        function selectSubtag(subtag) {
            currentSubtag = subtag;
            const statusName = getTagNameById(currentStatus);
            
            // 更新显示
            const statusEl = document.getElementById('currentStatus');
            if (statusEl) {
                statusEl.textContent = `${statusName} - ${subtag}`;
            }
            
            highlightSubtag(subtag);
            
            // 保存到本地
            if (startTime && currentStatus) {
                localStorage.setItem(BACKGROUND_SUBTAG_KEY, subtag);
            }
        }

        // 保存记录
        function saveRecord(tagId, start, end, subtag = '') {
            const duration = Math.floor((end - start) / 1000);
            if (duration < 1) return;
            
            const record = {
                id: Date.now() + Math.floor(Math.random() * 1000),
                tagId: tagId,
                subtag: subtag,
                start: start.toISOString(),
                end: end.toISOString(),
                duration: duration,
                date: getDateString(start),
                originalName: getTagNameById(tagId)
            };
            
            timeRecords.push(record);
            localStorage.setItem(TIME_RECORDS_V2_KEY, JSON.stringify(timeRecords));
            
            updateSummary();
            renderHistoryList();
        }

        // 更新统计汇总
        function updateSummary() {
            const summaryEl = document.getElementById('summaryBody');
            if (!summaryEl) return;
            summaryEl.innerHTML = '';
            
            const today = getTodayDateString();
            const tagStats = {};
            let totalDuration = 0;
            
            // 初始化标签统计
            statusTags.forEach(tag => {
                tagStats[tag.id] = {
                    name: tag.name,
                    duration: 0
                };
            });
            
            // 遍历记录累加时长
            timeRecords.forEach(record => {
                if (record.date !== today) return;
                
                totalDuration += record.duration;
                if (tagStats[record.tagId]) {
                    tagStats[record.tagId].duration += record.duration;
                } else {
                    // 兼容已删除的标签
                    tagStats[record.tagId] = {
                        name: record.originalName || '未知',
                        duration: record.duration
                    };
                }
            });
            
            // 渲染统计表格
            if (totalDuration === 0) {
                summaryEl.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 20px; color: var(--text-light);">暂无数据</td></tr>';
                return;
            }
            
            Object.values(tagStats).forEach(stat => {
                if (stat.duration === 0) return;
                const percentage = ((stat.duration / totalDuration) * 100).toFixed(1) + '%';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${stat.name}</td>
                    <td class="text-right font-bold">${formatDuration(stat.duration)}</td>
                    <td class="text-right">${percentage}</td>
                `;
                summaryEl.appendChild(row);
            });
        }

        // 渲染历史记录
        function renderHistoryList() {
            const listEl = document.getElementById('historyList');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            const today = getTodayDateString();
            const todayRecords = timeRecords.filter(r => r.date === today).reverse();
            
            if (todayRecords.length === 0) {
                listEl.innerHTML = '<li style="text-align: center; padding: 20px; color: var(--text-light);">暂无记录</li>';
                return;
            }
            
            todayRecords.forEach(record => {
                const start = new Date(record.start);
                const end = new Date(record.end);
                const startStr = start.toLocaleTimeString('zh-CN', {hour12: false});
                const endStr = end.toLocaleTimeString('zh-CN', {hour12: false});
                
                const item = document.createElement('li');
                item.className = 'history-item';
                const statusName = getTagNameById(record.tagId) || record.originalName;
                const statusText = record.subtag ? `${statusName} - ${record.subtag}` : statusName;
                
                item.innerHTML = `
                    <div class="history-info">
                        <div class="history-time">${startStr} - ${endStr}</div>
                        <div class="history-status">${statusText} · ${formatDuration(record.duration)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteRecord(${record.id})">🗑️</button>
                `;
                listEl.appendChild(item);
            });
        }

        // ===================== 设置菜单功能 =====================
        // 打开设置菜单
        function openSettingsMenu() {
            document.getElementById('settingsModal').classList.add('active');
        }

        // 关闭设置菜单
        function closeSettingsMenu() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // 导出全部记录CSV
        function exportAllRecordsCSV() {
            try {
                if (timeRecords.length === 0) {
                    alert('暂无任何记录可导出');
                    return;
                }

                // 构建CSV内容
                const header = "记录ID,标签ID,状态标签,曾用名,二级明细,开始时间,结束时间,时长(秒),时长(HH:MM:SS),原始标签名,记录日期\n";
                let csvContent = header;

                timeRecords.forEach(record => {
                    const tag = statusTags.find(t => t.id === record.tagId) || { name: '未知', aliases: [] };
                    const aliases = tag.aliases.length > 0 ? tag.aliases.join('、') : '-';
                    
                    const start = new Date(record.start).toLocaleString('zh-CN');
                    const end = new Date(record.end).toLocaleString('zh-CN');
                    const durationFormatted = formatDuration(record.duration);
                    
                    // 处理逗号转义
                    const status = tag.name.replace(/,/g, '，');
                    const subtag = (record.subtag || '').replace(/,/g, '，');
                    const originalName = (record.originalName || '').replace(/,/g, '，');

                    const row = [
                        record.id,
                        record.tagId,
                        `"${status}"`,
                        aliases,
                        `"${subtag}"`,
                        start,
                        end,
                        record.duration,
                        durationFormatted,
                        `"${originalName}"`,
                        record.date
                    ].join(',') + '\n';
                    
                    csvContent += row;
                });

                // 生成并下载
                const blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `时间追踪全部记录_${getTodayDateString()}.csv`;
                link.click();
                URL.revokeObjectURL(url);

            } catch (e) {
                console.error('导出CSV失败:', e);
                alert('导出失败，请重试！');
            }
        }

        // 清空所有记录
        function clearAllRecords() {
            if (!confirm('⚠️ 确定清空所有记录吗？此操作不可恢复！')) return;
            
            timeRecords = [];
            localStorage.setItem(TIME_RECORDS_V2_KEY, JSON.stringify(timeRecords));
            
            updateSummary();
            renderHistoryList();
            alert('所有记录已清空');
        }

        // ===================== 标签管理 =====================
        // 打开一级标签管理
        function openTagManager() {
            closeSettingsMenu(); // 先关闭设置菜单
            const modal = document.getElementById('tagModal');
            const container = document.getElementById('tagListContainer');
            container.innerHTML = '';
            
            // 渲染标签列表
            statusTags.forEach(tag => {
                const item = document.createElement('div');
                item.className = 'tag-item';
                item.innerHTML = `
                    <input type="text" value="${tag.name}" data-tag-id="${tag.id}" data-old-name="${tag.name}">
                    <div class="tag-actions">
                        <button class="btn-tag-action btn-save-tag" onclick="saveTag('${tag.id}')">保存</button>
                        <button class="btn-tag-action btn-del-tag" onclick="deleteTag('${tag.id}')">删除</button>
                    </div>
                `;
                container.appendChild(item);
            });
            
            modal.classList.add('active');
        }

        // 关闭一级标签管理
        function closeTagManager() {
            document.getElementById('tagModal').classList.remove('active');
        }

        // 添加新一级标签
        function addNewTag() {
            const input = document.getElementById('newTagInput');
            const name = input.value.trim();
            if (!name) return;
            
            // 避免重复
            if (statusTags.some(tag => tag.name === name)) {
                alert('标签已存在！');
                return;
            }
            
            // 生成新ID
            const newId = `tag_${Date.now().toString().slice(-4)}`;
            const newTag = {
                id: newId,
                name: name,
                aliases: []
            };
            
            statusTags.push(newTag);
            localStorage.setItem(TAGS_V2_KEY, JSON.stringify(statusTags));
            
            // 更新UI
            renderStatusButtons();
            openTagManager(); // 重新打开刷新列表
            input.value = '';
        }

        // 保存一级标签修改
        function saveTag(tagId) {
            const input = document.querySelector(`input[data-tag-id="${tagId}"]`);
            const oldName = input.dataset.oldName;
            const newName = input.value.trim();
            
            if (!newName || newName === oldName) return;
            
            const targetTag = statusTags.find(tag => tag.id === tagId);
            if (targetTag) {
                // 记录曾用名
                if (!targetTag.aliases.includes(oldName)) {
                    targetTag.aliases.push(oldName);
                }
                targetTag.name = newName;
                
                // 更新二级标签的键（如果有）
                if (subTags[oldName]) {
                    subTags[newName] = subTags[oldName];
                    delete subTags[oldName];
                    localStorage.setItem(SUBTAGS_KEY, JSON.stringify(subTags));
                }
                
                localStorage.setItem(TAGS_V2_KEY, JSON.stringify(statusTags));
                
                // 更新UI
                renderStatusButtons();
                updateSummary();
                renderHistoryList();
                openTagManager(); // 重新打开刷新列表
            }
        }

        // 删除一级标签
        function deleteTag(tagId) {
            const tag = statusTags.find(t => t.id === tagId);
            if (!confirm(`确定删除标签「${tag.name}」吗？删除后相关记录仍保留，但统计时会显示为"未知"。`)) return;
            
            statusTags = statusTags.filter(tag => tag.id !== tagId);
            localStorage.setItem(TAGS_V2_KEY, JSON.stringify(statusTags));
            
            // 更新UI
            renderStatusButtons();
            updateSummary();
            openTagManager();
        }

        // 打开二级标签管理
        function openSubtagManager() {
            closeSettingsMenu(); // 先关闭设置菜单
            const modal = document.getElementById('subtagModal');
            const mainTagSelect = document.getElementById('mainTagSelect');
            
            // 清空并渲染一级标签下拉框
            mainTagSelect.innerHTML = '<option value="">选择一级标签</option>';
            statusTags.forEach(tag => {
                const option = document.createElement('option');
                option.value = tag.name;
                option.textContent = tag.name;
                mainTagSelect.appendChild(option);
            });
            
            modal.classList.add('active');
            
            // 初始化二级标签列表
            if (statusTags.length > 0) {
                mainTagSelect.value = statusTags[0].name;
                renderSubtagList(statusTags[0].name);
            }
            
            mainTagSelect.onchange = function() {
                renderSubtagList(this.value);
            };
        }

        // 关闭二级标签管理
        function closeSubtagManager() {
            document.getElementById('subtagModal').classList.remove('active');
        }

        // 渲染二级标签列表
        function renderSubtagList(mainTagName) {
            const container = document.getElementById('subtagListContainer');
            if (!container || !mainTagName) {
                container.innerHTML = '';
                return;
            }
            
            const subtags = subTags[mainTagName] || [];
            container.innerHTML = '';
            
            subtags.forEach(subtag => {
                const item = document.createElement('div');
                item.className = 'tag-item';
                item.innerHTML = `
                    <input type="text" value="${subtag}" data-main="${mainTagName}" data-sub="${subtag}">
                    <div class="tag-actions">
                        <button class="btn-tag-action btn-save-tag" onclick="saveSubtag('${mainTagName}', '${subtag}')">保存</button>
                        <button class="btn-tag-action btn-del-tag" onclick="deleteSubtag('${mainTagName}', '${subtag}')">删除</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 添加新二级标签
        function addNewSubtag() {
            const mainTagName = document.getElementById('mainTagSelect').value;
            const newSubtag = document.getElementById('newSubtagInput').value.trim();
            
            if (!mainTagName || !newSubtag) return;
            
            if (!subTags[mainTagName]) subTags[mainTagName] = [];
            
            if (subTags[mainTagName].includes(newSubtag)) {
                alert('二级标签已存在！');
                return;
            }
            
            subTags[mainTagName].push(newSubtag);
            localStorage.setItem(SUBTAGS_KEY, JSON.stringify(subTags));
            
            renderSubtagList(mainTagName);
            document.getElementById('newSubtagInput').value = '';
        }

        // 保存二级标签修改
        function saveSubtag(mainTagName, oldSubtag) {
            const input = document.querySelector(`input[data-main="${mainTagName}"][data-sub="${oldSubtag}"]`);
            const newSubtag = input.value.trim();
            
            if (!newSubtag || newSubtag === oldSubtag) return;
            
            const index = subTags[mainTagName].indexOf(oldSubtag);
            if (index > -1) {
                subTags[mainTagName][index] = newSubtag;
                localStorage.setItem(SUBTAGS_KEY, JSON.stringify(subTags));
                renderSubtagList(mainTagName);
            }
        }

        // 删除二级标签
        function deleteSubtag(mainTagName, subtag) {
            if (!confirm(`确定删除二级标签「${subtag}」吗？`)) return;
            
            const index = subTags[mainTagName].indexOf(subtag);
            if (index > -1) {
                subTags[mainTagName].splice(index, 1);
                localStorage.setItem(SUBTAGS_KEY, JSON.stringify(subTags));
                renderSubtagList(mainTagName);
            }
        }

        // 从快捷添加按钮添加二级标签
        function addNewSubtagFromManager() {
            addNewSubtag();
        }

        // ===================== 工具函数 =====================
        // 获取标签名称通过ID
        function getTagNameById(tagId) {
            const tag = statusTags.find(t => t.id === tagId);
            return tag ? tag.name : '未知';
        }

        // 获取标签曾用名通过ID
        function getTagAliasesById(tagId) {
            const tag = statusTags.find(t => t.id === tagId);
            return tag ? tag.aliases : [];
        }

        // 获取日期字符串 YYYY-MM-DD
        function getDateString(date) {
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }

        // 获取今日日期字符串
        function getTodayDateString() {
            return getDateString(new Date());
        }

        // 格式化时长
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            const parts = [];
            if (hours > 0) parts.push(`${hours}小时`);
            if (minutes > 0) parts.push(`${minutes}分`);
            if (secs > 0 && parts.length === 0) parts.push(`${secs}秒`);
            
            return parts.join('') || '0分';
        }

        // 删除记录
        function deleteRecord(id) {
            if (!confirm('确定删除这条记录吗？')) return;
            
            timeRecords = timeRecords.filter(record => record.id !== id);
            localStorage.setItem(TIME_RECORDS_V2_KEY, JSON.stringify(timeRecords));
            
            updateSummary();
            renderHistoryList();
        }

        // 切换视图
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(`view-${view}`).classList.add('active');
            
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`nav-${view}`).classList.add('active');
            
            if (view === 'history') renderHistoryList();
        }

                // 生成并下载
                const blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `时间追踪记录_${today}.csv`;
                link.click();
                URL.revokeObjectURL(url);

            } catch (e) {
                console.error('导出CSV失败:', e);
                alert('导出失败，请重试！');
            }
        }

        // 页面卸载时保存状态
        window.addEventListener('beforeunload', function() {
            if (startTime && currentStatus) {
                localStorage.setItem(BACKGROUND_START_KEY, startTime.toISOString());
                localStorage.setItem(BACKGROUND_STATUS_KEY, currentStatus);
                localStorage.setItem(BACKGROUND_SUBTAG_KEY, currentSubtag);
                localStorage.setItem(BACKGROUND_DATE_KEY, sessionDateStr);
            }
        });
    </script>
</body>
</html>
